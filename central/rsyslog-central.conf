# rsyslog-central.conf
# Drop this in /etc/rsyslog.d/10-security-central.conf on your log server.
# Receives logs from agents over TLS and stores them by hostname under
# /var/log/remote/.

global(
  defaultNetstreamDriver="gtls"
  defaultNetstreamDriverCAFile="/etc/rsyslog.d/certs/logging-ca.pem"
  defaultNetstreamDriverCertFile="/etc/rsyslog.d/certs/server-cert.pem"
  defaultNetstreamDriverKeyFile="/etc/rsyslog.d/certs/server-key.pem"
  preserveFQDN="on"
  umask="0027"
)

module(load="imtcp")

template(name="RemoteAuthLog" type="string" string="/var/log/remote/%HOSTNAME%/auth.log")
template(name="RemoteKernLog" type="string" string="/var/log/remote/%HOSTNAME%/kern.log")
template(name="RemoteCronLog" type="string" string="/var/log/remote/%HOSTNAME%/cron.log")
template(name="RemoteAuditLog" type="string" string="/var/log/remote/%HOSTNAME%/audit.log")
template(name="RemoteSyslogLog" type="string" string="/var/log/remote/%HOSTNAME%/syslog.log")

input(
  type="imtcp"
  port="6514"
  StreamDriver.Name="gtls"
  StreamDriver.Mode="1"
  StreamDriver.AuthMode="x509/certvalid"
)

if ($fromhost-ip != "127.0.0.1" and $inputname == "imtcp") then {
  if prifilt("auth,authpriv.*") then {
    action(type="omfile" dynaFile="RemoteAuthLog" createDirs="on" dirCreateMode="0750" fileCreateMode="0640")
    stop
  }

  if prifilt("kern.*") then {
    action(type="omfile" dynaFile="RemoteKernLog" createDirs="on" dirCreateMode="0750" fileCreateMode="0640")
    stop
  }

  if prifilt("cron.*") then {
    action(type="omfile" dynaFile="RemoteCronLog" createDirs="on" dirCreateMode="0750" fileCreateMode="0640")
    stop
  }

  if prifilt("local6.*") then {
    action(type="omfile" dynaFile="RemoteAuditLog" createDirs="on" dirCreateMode="0750" fileCreateMode="0640")
    stop
  }

  action(type="omfile" dynaFile="RemoteSyslogLog" createDirs="on" dirCreateMode="0750" fileCreateMode="0640")
  stop
}
