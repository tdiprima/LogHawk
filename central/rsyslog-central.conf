# rsyslog-central.conf
# Drop this in /etc/rsyslog.d/10-security-central.conf on your log server.
# Receives logs from agents and stores them by hostname under /var/log/remote/.

# ── Load TCP input module ─────────────────────────────────────────────
$ModLoad imtcp
$InputTCPServerRun 514

# ── Store logs organized by sender hostname ──────────────────────────
# Creates: /var/log/remote/<hostname>/<facility>.log
# Example: /var/log/remote/web-server-01/auth.log

$template RemoteAuthLog,   "/var/log/remote/%HOSTNAME%/auth.log"
$template RemoteKernLog,   "/var/log/remote/%HOSTNAME%/kern.log"
$template RemoteCronLog,   "/var/log/remote/%HOSTNAME%/cron.log"
$template RemoteSyslog,    "/var/log/remote/%HOSTNAME%/syslog.log"

# ── Routing rules (only apply to remote messages) ────────────────────
if $fromhost-ip != '127.0.0.1' then {
    auth,authpriv.*     ?RemoteAuthLog
    kern.*              ?RemoteKernLog
    cron.*              ?RemoteCronLog
    *.*                 ?RemoteSyslog
    stop
}

# ── Log rotation hint ────────────────────────────────────────────────
# Add a file at /etc/logrotate.d/remote-logs:
#
#   /var/log/remote/*/*.log {
#       daily
#       rotate 30
#       compress
#       delaycompress
#       missingok
#       notifempty
#       sharedscripts
#       postrotate
#           /usr/bin/systemctl reload rsyslog > /dev/null 2>&1 || true
#       endscript
#   }
