# rsyslog-agent.conf
# Drop this in /etc/rsyslog.d/99-security-forward.conf on each monitored server.
# Forwards auth, kernel, cron, daemon, syslog, and auditd logs to the central
# log server over TLS with certificate validation.

global(
  defaultNetstreamDriver="gtls"
  defaultNetstreamDriverCAFile="TLS_CA_FILE"
  defaultNetstreamDriverCertFile="TLS_CERT_FILE"
  defaultNetstreamDriverKeyFile="TLS_KEY_FILE"
  preserveFQDN="on"
)

module(load="imuxsock")
module(load="imklog")
module(load="imfile")

# Forward auditd's file-backed log through rsyslog so it reaches the collector.
# auditd keeps its own local copy in /var/log/audit/audit.log.
input(
  type="imfile"
  File="/var/log/audit/audit.log"
  Tag="auditd"
  Facility="local6"
  Severity="info"
  PersistStateInterval="100"
)

ruleset(name="forward_to_central") {
  action(
    type="omfwd"
    protocol="tcp"
    target="CENTRAL_LOG_SERVER"
    port="TLS_PORT"
    StreamDriver="gtls"
    StreamDriverMode="1"
    StreamDriverAuthMode="x509/name"
    StreamDriverPermittedPeers=["CENTRAL_PERMITTED_PEER"]
    Template="RSYSLOG_SyslogProtocol23Format"
    queue.type="LinkedList"
    queue.filename="security_fwd_queue"
    queue.maxdiskspace="500m"
    queue.saveonshutdown="on"
    queue.dequeuebatchsize="1000"
    action.resumeRetryCount="-1"
    action.reportSuspension="on"
    action.reportSuspensionContinuation="on"
  )
}

# ── Forward rules ────────────────────────────────────────────────────
auth,authpriv.*         call forward_to_central
kern.*                  call forward_to_central
cron.*                  call forward_to_central
daemon.*                call forward_to_central
syslog.*                call forward_to_central
local6.*                call forward_to_central

# ── Local copy ───────────────────────────────────────────────────────
# Keep host-native logs locally. auditd already persists its own local file.
auth,authpriv.*         /var/log/auth.log
kern.*                  /var/log/kern.log
cron.*                  /var/log/cron.log
