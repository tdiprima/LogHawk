# rsyslog-agent.conf
# Drop this in /etc/rsyslog.d/99-security-forward.conf on each monitored server.
# Forwards auth, kernel, syslog, and audit logs to the central log server.
# Change CENTRAL_LOG_SERVER to your actual log server IP or hostname.

# ── What to collect ──────────────────────────────────────────────────
# auth/authpriv: SSH logins, sudo, PAM
# kern: kernel messages (oom-killer, segfaults)
# cron: scheduled job execution
# daemon: background services

$ModLoad imuxsock    # local system logging socket
$ModLoad imklog      # kernel log messages

# ── Forward rules ────────────────────────────────────────────────────
# Send these facilities to the central server over TCP (reliable).
# TCP port 514. Change to @@ for TCP, @ for UDP.
# Format: @@host:port means TCP.

auth,authpriv.*         @@CENTRAL_LOG_SERVER:514
kern.*                  @@CENTRAL_LOG_SERVER:514
cron.*                  @@CENTRAL_LOG_SERVER:514
daemon.*                @@CENTRAL_LOG_SERVER:514
syslog.*                @@CENTRAL_LOG_SERVER:514

# ── Local copy ───────────────────────────────────────────────────────
# Keep a local copy too. Never lose logs just because the network is down.
auth,authpriv.*         /var/log/auth.log
kern.*                  /var/log/kern.log
cron.*                  /var/log/cron.log

# ── Retry queue ──────────────────────────────────────────────────────
# If central server is down, buffer up to 10,000 messages on disk.
$ActionQueueType LinkedList
$ActionQueueFileName security_fwd_queue
$ActionQueueMaxDiskSpace 50m
$ActionQueueSaveOnShutdown on
$ActionResumeRetryCount -1
